<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ziggit — Git Clone in Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; line-height: 1.6; }
    h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }
    .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 0.85em; }
    .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    input[type="text"] { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 0.9em; }
    #url { width: 460px; }
    #corsProxy { width: 300px; }
    button { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.9em; }
    button:hover { background: #2ea043; }
    button:disabled { background: #30363d; cursor: not-allowed; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #f0883e; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { color: #f0883e; font-size: 0.85em; min-height: 1.4em; }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 12px; overflow: auto; }
    .panel h2 { color: #58a6ff; font-size: 1em; margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px; cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
    .panel h2 .chevron { transition: transform 0.2s; display: inline-block; font-size: 0.7em; }
    .panel h2 .chevron.collapsed { transform: rotate(-90deg); }
    .panel .panel-body { transition: max-height 0.3s ease, opacity 0.2s ease; overflow: hidden; }
    .panel .panel-body.collapsed { max-height: 0 !important; opacity: 0; overflow: hidden; }
    #log-panel, #tree-panel, #file-panel { max-height: 400px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th { text-align: left; color: #8b949e; padding: 4px 8px; border-bottom: 1px solid #21262d; }
    td { padding: 4px 8px; border-bottom: 1px solid #21262d; }
    tr:hover { background: #1c2128; }
    .hash { color: #f0883e; cursor: pointer; }
    .hash:hover { text-decoration: underline; }
    .tree-link { color: #58a6ff; cursor: pointer; }
    .tree-link:hover { text-decoration: underline; }
    .blob-link { color: #7ee787; cursor: pointer; }
    .blob-link:hover { text-decoration: underline; }
    pre.file-content { white-space: pre-wrap; word-break: break-all; color: #c9d1d9; font-size: 0.85em; max-height: 500px; overflow: auto; }
    .info { color: #8b949e; font-size: 0.85em; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } #url { width: 100%; } }
    .breadcrumb { color: #8b949e; font-size: 0.85em; margin-bottom: 8px; }
    .breadcrumb a { color: #58a6ff; cursor: pointer; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .progress-bar { background: #21262d; border-radius: 4px; height: 6px; margin: 8px 0; overflow: hidden; display: none; }
    .progress-fill { background: #58a6ff; height: 100%; width: 0%; transition: width 0.2s; }
    .stats { color: #8b949e; font-size: 0.8em; margin-top: 4px; }
    #search { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 0.85em; width: 200px; margin-bottom: 8px; display: none; }
    #search::placeholder { color: #484f58; }
    .timing { color: #7ee787; font-size: 0.8em; }
    #file-panel { max-height: 600px; }
    .line-numbers { display: flex; font-size: 0.85em; }
    .line-numbers .nums { color: #484f58; text-align: right; padding-right: 12px; border-right: 1px solid #21262d; margin-right: 12px; user-select: none; white-space: pre; }
    .line-numbers .code { white-space: pre-wrap; word-break: break-all; flex: 1; }
    #diag-panel { font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>⚡ ziggit</h1>
  <div class="subtitle">Pure Zig git implementation compiled to WebAssembly — clone any public repo in your browser. <span id="wasm-version" class="info">loading wasm...</span></div>

  <div class="row">
    <input type="text" id="corsProxy" placeholder="CORS proxy URL" value="/proxy/">
    <select id="proxyPreset" onchange="document.getElementById('corsProxy').value=this.value" style="background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;font-family:inherit;font-size:0.85em">
      <option value="/proxy/">Built-in (same-origin)</option>
      <option value="https://corsproxy.io/?">corsproxy.io</option>
      <option value="https://api.allorigins.win/raw?url=">allorigins.win</option>
      <option value="">No proxy (direct)</option>
    </select>
    <span class="info">CORS proxy prefix</span>
  </div>
  <div class="row">
    <input type="text" id="url" value="https://github.com/nicolo-ribaudo/jest-light-runner" placeholder="Repository URL" onkeydown="if(event.key==='Enter')doClone()">
    <button id="cloneBtn" onclick="doClone()">Clone</button>
    <span id="status"></span>
  </div>
  <div class="progress-bar" id="progress"><div class="progress-fill" id="progress-fill"></div></div>

  <div id="diag-panel" class="panel" style="display:none">
    <h2 onclick="togglePanel(this)"><span class="chevron">▼</span> Diagnostics</h2>
    <div class="panel-body">
      <div id="diag-details"></div>
    </div>
  </div>

  <div id="repo-info" class="panel" style="display:none">
    <h2 onclick="togglePanel(this)"><span class="chevron">▼</span> Repository</h2>
    <div class="panel-body">
      <div id="repo-details"></div>
    </div>
  </div>

  <div class="panels">
    <div id="log-panel" class="panel" style="display:none">
      <h2 onclick="togglePanel(this)"><span class="chevron">▼</span> Commit Log</h2>
      <div class="panel-body">
        <table id="log-table"><thead><tr><th>Hash</th><th>Author</th><th>Message</th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <div id="tree-panel" class="panel" style="display:none">
      <h2 onclick="togglePanel(this)"><span class="chevron">▼</span> Files</h2>
      <div class="panel-body">
        <input type="text" id="search" placeholder="Filter files..." oninput="filterTree()">
        <div id="tree-breadcrumb" class="breadcrumb"></div>
        <table id="tree-table"><thead><tr><th>Mode</th><th>Type</th><th>Name</th><th>Size</th><th>Hash</th></tr></thead><tbody></tbody></table>
      </div>
    </div>
  </div>

  <div id="commit-panel" class="panel" style="display:none">
    <h2 onclick="togglePanel(this)"><span class="chevron">▼</span> Commit: <span id="commit-hash" class="hash"></span></h2>
    <div class="panel-body">
      <div id="commit-details"></div>
    </div>
  </div>

  <div id="file-panel" class="panel" style="display:none">
    <h2 onclick="togglePanel(this)"><span class="chevron">▼</span> File: <span id="file-name"></span></h2>
    <div class="panel-body">
      <pre class="file-content" id="file-content"></pre>
    </div>
  </div>

  <script>
    // --- Collapsible panels ---
    function togglePanel(h2) {
      const chevron = h2.querySelector('.chevron');
      const body = h2.nextElementSibling;
      if (!body || !body.classList.contains('panel-body')) return;
      const isCollapsed = body.classList.toggle('collapsed');
      chevron.classList.toggle('collapsed', isCollapsed);
    }

    // --- WASM module (required — no JS fallbacks) ---
    let wasmInstance = null;
    let wasmReady = new Promise((resolve, reject) => {
      (async function() {
        try {
          const noopFn = () => {};
          const noopRet = () => 0;
          const env = {
            host_write_stdout: noopFn, host_write_stderr: noopFn,
            host_write_file: noopRet, host_read_file: noopRet,
            host_file_exists: noopRet, host_make_dir: noopRet,
            host_delete_file: noopRet, host_get_cwd: noopRet,
            host_http_get: noopRet, host_http_post: noopRet,
          };
          const resp = await fetch('ziggit.wasm');
          let instance;
          try {
            ({ instance } = await WebAssembly.instantiateStreaming(resp, { env }));
          } catch (streamErr) {
            const buf = await (await fetch('ziggit.wasm')).arrayBuffer();
            ({ instance } = await WebAssembly.instantiate(buf, { env }));
          }
          wasmInstance = instance;
          const e = instance.exports;
          const ptr = e.ziggit_alloc(128);
          const len = e.ziggit_version(ptr, 128);
          const ver = new TextDecoder().decode(new Uint8Array(e.memory.buffer, ptr, len));
          e.ziggit_free(ptr, 128);
          const numExports = Object.keys(e).filter(k => typeof e[k] === 'function').length;
          const wasmSize = formatSize(new Uint8Array(await (await fetch('ziggit.wasm')).arrayBuffer()).length);
          document.getElementById('wasm-version').textContent = `${ver} (${numExports} exports, ${wasmSize} binary)`;
          console.log('WASM loaded:', ver, '— exports:', numExports);
          resolve();
        } catch (e) {
          document.getElementById('wasm-version').textContent = 'WASM failed to load — demo requires WebAssembly';
          document.getElementById('wasm-version').style.color = '#f85149';
          console.error('WASM load failed:', e);
          reject(e);
        }
      })();
    });

    // Object database: sha1 hex -> { type: string, data: Uint8Array }
    const objectDb = {};
    let currentCommit = null;

    // --- Helpers ---
    function status(msg, isError) {
      const el = document.getElementById('status');
      el.style.color = isError ? '#f85149' : '#f0883e';
      if (!isError && msg && !msg.startsWith('Ready!') && !msg.startsWith('Viewing')) {
        el.innerHTML = '<span class="spinner"></span>' + escHtml(msg);
      } else {
        el.textContent = msg;
      }
    }

    function showProgress(pct) {
      const bar = document.getElementById('progress');
      const fill = document.getElementById('progress-fill');
      if (pct < 0) { bar.style.display = 'none'; return; }
      bar.style.display = 'block';
      fill.style.width = Math.min(100, pct) + '%';
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function bytesToHex(bytes) {
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --- WASM wrappers ---
    // All git operations go through WASM. No JS reimplementations.

    function wasmSha1Hex(data) {
      const e = wasmInstance.exports;
      const ptr = e.ziggit_alloc(data.length);
      if (!ptr) throw new Error('WASM alloc failed for SHA-1 input');
      const hashPtr = e.ziggit_alloc(20);
      if (!hashPtr) { e.ziggit_free(ptr, data.length); throw new Error('WASM alloc failed for SHA-1 output'); }
      new Uint8Array(e.memory.buffer, ptr, data.length).set(data);
      e.ziggit_sha1(ptr, data.length, hashPtr);
      const hex = bytesToHex(new Uint8Array(e.memory.buffer, hashPtr, 20));
      e.ziggit_free(ptr, data.length);
      e.ziggit_free(hashPtr, 20);
      return hex;
    }

    function wasmDecompress(data, offset) {
      const e = wasmInstance.exports;
      const inputLen = data.length - offset;
      const inputPtr = e.ziggit_alloc(inputLen);
      if (!inputPtr) throw new Error('WASM alloc failed for decompress input');
      const outPtrPtr = e.ziggit_alloc(4);
      const outLenPtr = e.ziggit_alloc(4);
      const consumedPtr = e.ziggit_alloc(4);
      new Uint8Array(e.memory.buffer, inputPtr, inputLen).set(data.subarray(offset));
      const rc = e.ziggit_zlib_decompress(inputPtr, inputLen, outPtrPtr, outLenPtr, consumedPtr);
      if (rc !== 0) {
        e.ziggit_free(inputPtr, inputLen);
        e.ziggit_free(outPtrPtr, 4);
        e.ziggit_free(outLenPtr, 4);
        e.ziggit_free(consumedPtr, 4);
        throw new Error('WASM zlib decompress failed (rc=' + rc + ') at offset ' + offset);
      }
      const buf = e.memory.buffer;
      const view = new DataView(buf);
      const resultPtr = view.getUint32(outPtrPtr, true);
      const resultLen = view.getUint32(outLenPtr, true);
      const consumed = view.getUint32(consumedPtr, true);
      const result = new Uint8Array(buf, resultPtr, resultLen).slice();
      e.ziggit_free(inputPtr, inputLen);
      e.ziggit_free(outPtrPtr, 4);
      e.ziggit_free(outLenPtr, 4);
      e.ziggit_free(consumedPtr, 4);
      e.ziggit_free(resultPtr, resultLen);
      return { result, bytesRead: consumed };
    }

    function wasmApplyDelta(base, delta) {
      const e = wasmInstance.exports;
      const basePtr = e.ziggit_alloc(base.length);
      if (!basePtr) throw new Error('WASM alloc failed for delta base');
      const deltaPtr = e.ziggit_alloc(delta.length);
      if (!deltaPtr) { e.ziggit_free(basePtr, base.length); throw new Error('WASM alloc failed for delta data'); }
      const resPtrPtr = e.ziggit_alloc(4);
      const resLenPtr = e.ziggit_alloc(4);
      new Uint8Array(e.memory.buffer, basePtr, base.length).set(base);
      new Uint8Array(e.memory.buffer, deltaPtr, delta.length).set(delta);
      const rc = e.ziggit_apply_delta(basePtr, base.length, deltaPtr, delta.length, resPtrPtr, resLenPtr);
      if (rc !== 0) {
        e.ziggit_free(basePtr, base.length);
        e.ziggit_free(deltaPtr, delta.length);
        e.ziggit_free(resPtrPtr, 4);
        e.ziggit_free(resLenPtr, 4);
        throw new Error('WASM delta application failed (rc=' + rc + ')');
      }
      const buf = e.memory.buffer;
      const view = new DataView(buf);
      const resultPtr = view.getUint32(resPtrPtr, true);
      const resultLen = view.getUint32(resLenPtr, true);
      const result = new Uint8Array(buf, resultPtr, resultLen).slice();
      e.ziggit_free(basePtr, base.length);
      e.ziggit_free(deltaPtr, delta.length);
      e.ziggit_free(resPtrPtr, 4);
      e.ziggit_free(resLenPtr, 4);
      e.ziggit_free(resultPtr, resultLen);
      return result;
    }

    function wasmExtractPack(responseData) {
      const e = wasmInstance.exports;
      const inputPtr = e.ziggit_alloc(responseData.length);
      if (!inputPtr) throw new Error('WASM alloc failed for pack extraction');
      const outPtrPtr = e.ziggit_alloc(4);
      const outLenPtr = e.ziggit_alloc(4);
      new Uint8Array(e.memory.buffer, inputPtr, responseData.length).set(responseData);
      const rc = e.ziggit_extract_pack_data(inputPtr, responseData.length, outPtrPtr, outLenPtr);
      e.ziggit_free(inputPtr, responseData.length);
      if (rc !== 0) {
        e.ziggit_free(outPtrPtr, 4);
        e.ziggit_free(outLenPtr, 4);
        return null;
      }
      const buf = e.memory.buffer;
      const view = new DataView(buf);
      const resultPtr = view.getUint32(outPtrPtr, true);
      const resultLen = view.getUint32(outLenPtr, true);
      const result = new Uint8Array(buf, resultPtr, resultLen).slice();
      e.ziggit_free(outPtrPtr, 4);
      e.ziggit_free(outLenPtr, 4);
      e.ziggit_free(resultPtr, resultLen);
      return result;
    }

    function wasmParseRefs(data) {
      const e = wasmInstance.exports;
      if (!e.ziggit_parse_refs) return null;
      const inputPtr = e.ziggit_alloc(data.length);
      if (!inputPtr) return null;
      const outPtrPtr = e.ziggit_alloc(4);
      const outLenPtr = e.ziggit_alloc(4);
      new Uint8Array(e.memory.buffer, inputPtr, data.length).set(new TextEncoder().encode(data));
      const rc = e.ziggit_parse_refs(inputPtr, data.length, outPtrPtr, outLenPtr);
      e.ziggit_free(inputPtr, data.length);
      if (rc !== 0) {
        e.ziggit_free(outPtrPtr, 4);
        e.ziggit_free(outLenPtr, 4);
        return null;
      }
      const buf = e.memory.buffer;
      const view = new DataView(buf);
      const jp = view.getUint32(outPtrPtr, true);
      const jl = view.getUint32(outLenPtr, true);
      const json = new TextDecoder().decode(new Uint8Array(buf, jp, jl));
      e.ziggit_free(outPtrPtr, 4);
      e.ziggit_free(outLenPtr, 4);
      e.ziggit_free(jp, jl);
      try { return JSON.parse(json); } catch (_) { return null; }
    }

    function wasmBuildWantRequest(hash) {
      const e = wasmInstance.exports;
      if (!e.ziggit_build_want_request) return null;
      const hp = e.ziggit_alloc(40);
      const op = e.ziggit_alloc(4);
      const ol = e.ziggit_alloc(4);
      if (!hp || !op || !ol) return null;
      new Uint8Array(e.memory.buffer, hp, 40).set(new TextEncoder().encode(hash));
      const rc = e.ziggit_build_want_request(hp, 40, op, ol);
      e.ziggit_free(hp, 40);
      if (rc !== 0) { e.ziggit_free(op, 4); e.ziggit_free(ol, 4); return null; }
      const buf = e.memory.buffer;
      const view = new DataView(buf);
      const rp = view.getUint32(op, true);
      const rl = view.getUint32(ol, true);
      const result = new TextDecoder().decode(new Uint8Array(buf, rp, rl));
      e.ziggit_free(op, 4);
      e.ziggit_free(ol, 4);
      e.ziggit_free(rp, rl);
      return result;
    }

    function wasmWalkCommits(headHash, maxCount) {
      const e = wasmInstance.exports;
      const hp = e.ziggit_alloc(40);
      const op = e.ziggit_alloc(4);
      const ol = e.ziggit_alloc(4);
      if (!hp || !op || !ol) return null;
      new Uint8Array(e.memory.buffer, hp, 40).set(new TextEncoder().encode(headHash));
      const rc = e.ziggit_walk_commits(hp, 40, maxCount, op, ol);
      e.ziggit_free(hp, 40);
      if (rc !== 0) { e.ziggit_free(op, 4); e.ziggit_free(ol, 4); return null; }
      const v = new DataView(e.memory.buffer);
      const jp = v.getUint32(op, true), jl = v.getUint32(ol, true);
      const json = new TextDecoder().decode(new Uint8Array(e.memory.buffer, jp, jl));
      e.ziggit_free(op, 4); e.ziggit_free(ol, 4); e.ziggit_free(jp, jl);
      try { return JSON.parse(json); } catch (_) { return null; }
    }

    function wasmParseCommit(data) {
      const e = wasmInstance.exports;
      if (!e.ziggit_parse_commit) return null;
      const ip = e.ziggit_alloc(data.length);
      if (!ip) return null;
      const op = e.ziggit_alloc(4);
      const ol = e.ziggit_alloc(4);
      new Uint8Array(e.memory.buffer, ip, data.length).set(data);
      const rc = e.ziggit_parse_commit(ip, data.length, op, ol);
      e.ziggit_free(ip, data.length);
      if (rc !== 0) { e.ziggit_free(op, 4); e.ziggit_free(ol, 4); return null; }
      const buf = e.memory.buffer;
      const v = new DataView(buf);
      const jp = v.getUint32(op, true), jl = v.getUint32(ol, true);
      const json = new TextDecoder().decode(new Uint8Array(buf, jp, jl));
      e.ziggit_free(op, 4); e.ziggit_free(ol, 4); e.ziggit_free(jp, jl);
      try { return JSON.parse(json); } catch (_) { return null; }
    }

    function wasmParseTree(data) {
      const e = wasmInstance.exports;
      if (!e.ziggit_parse_tree) return null;
      const ip = e.ziggit_alloc(data.length);
      if (!ip) return null;
      const op = e.ziggit_alloc(4);
      const ol = e.ziggit_alloc(4);
      new Uint8Array(e.memory.buffer, ip, data.length).set(data);
      const rc = e.ziggit_parse_tree(ip, data.length, op, ol);
      e.ziggit_free(ip, data.length);
      if (rc !== 0) { e.ziggit_free(op, 4); e.ziggit_free(ol, 4); return null; }
      const buf = e.memory.buffer;
      const v = new DataView(buf);
      const jp = v.getUint32(op, true), jl = v.getUint32(ol, true);
      const json = new TextDecoder().decode(new Uint8Array(buf, jp, jl));
      e.ziggit_free(op, 4); e.ziggit_free(ol, 4); e.ziggit_free(jp, jl);
      try { return JSON.parse(json); } catch (_) { return null; }
    }

    // --- Pkt-line ref parsing (JS — this is network protocol framing, not git logic) ---
    function parsePktLineRefs(text) {
      // Try WASM first
      const wasmRefs = wasmParseRefs(text);
      if (wasmRefs) {
        const refs = {};
        const entries = Array.isArray(wasmRefs) ? wasmRefs : (wasmRefs.refs || []);
        for (const entry of entries) refs[entry.name || entry.ref] = entry.hash || entry.oid;
        return refs;
      }
      // Minimal JS fallback for protocol framing only
      const refs = {};
      let pos = 0;
      while (pos + 4 <= text.length) {
        const lenHex = text.substring(pos, pos + 4);
        if (lenHex === '0000') { pos += 4; continue; }
        const pktLen = parseInt(lenHex, 16);
        if (isNaN(pktLen) || pktLen < 4) break;
        if (pos + pktLen > text.length) break;
        const line = text.substring(pos + 4, pos + pktLen);
        pos += pktLen;
        if (line.startsWith('#')) continue;
        const match = line.match(/^([0-9a-f]{40}) ([^\s\0\n]+)/);
        if (match) refs[match[2]] = match[1];
      }
      return refs;
    }

    // --- Build want request ---
    function buildWantRequest(hash) {
      const wasmReq = wasmBuildWantRequest(hash);
      if (wasmReq) return wasmReq;
      // Minimal JS fallback for protocol construction
      const wantLine = `want ${hash} side-band-64k ofs-delta no-progress include-tag no-thin agent=ziggit-browser\n`;
      const pktWant = (wantLine.length + 4).toString(16).padStart(4, '0') + wantLine;
      return pktWant + '00000009done\n';
    }

    // --- Parse commit (WASM, with minimal JS fallback for display) ---
    function parseCommit(data) {
      const parsed = wasmParseCommit(data);
      if (parsed) {
        return {
          tree: parsed.tree || null,
          parents: parsed.parents || [],
          author: parsed.author || '',
          message: parsed.message || '',
        };
      }
      // Minimal JS text parsing — commit data is already decompressed by WASM
      const text = new TextDecoder().decode(data);
      const lines = text.split('\n');
      const result = { tree: null, parents: [], author: '', message: '' };
      let i = 0;
      for (; i < lines.length; i++) {
        if (lines[i] === '') { i++; break; }
        if (lines[i].startsWith('tree ')) result.tree = lines[i].slice(5);
        else if (lines[i].startsWith('parent ')) result.parents.push(lines[i].slice(7));
        else if (lines[i].startsWith('author ')) result.author = lines[i].slice(7);
      }
      result.message = lines.slice(i).join('\n').trim();
      return result;
    }

    // --- Parse tree (WASM, with minimal JS fallback for display) ---
    function parseTree(data) {
      const parsed = wasmParseTree(data);
      if (parsed) {
        return parsed.map(e => ({
          mode: e.mode || '',
          name: e.name || '',
          hash: e.hash || e.oid || '',
          type: (e.mode === '40000' || e.type === 'tree') ? 'tree' : (e.mode === '160000' ? 'commit' : 'blob'),
        }));
      }
      // Minimal JS binary parsing — tree data is already decompressed by WASM
      const entries = [];
      let pos = 0;
      while (pos < data.length) {
        let spaceIdx = pos;
        while (spaceIdx < data.length && data[spaceIdx] !== 0x20) spaceIdx++;
        if (spaceIdx >= data.length) break;
        const mode = new TextDecoder().decode(data.subarray(pos, spaceIdx));
        let nullIdx = spaceIdx + 1;
        while (nullIdx < data.length && data[nullIdx] !== 0) nullIdx++;
        if (nullIdx >= data.length || nullIdx + 21 > data.length) break;
        const name = new TextDecoder().decode(data.subarray(spaceIdx + 1, nullIdx));
        const hash = bytesToHex(data.subarray(nullIdx + 1, nullIdx + 21));
        pos = nullIdx + 21;
        const type = mode === '40000' ? 'tree' : (mode === '160000' ? 'commit' : 'blob');
        entries.push({ mode, name, hash, type });
      }
      return entries;
    }

    // --- Pack parsing helpers (varint/offset reading — pure format decoding) ---
    function readVarInt(data, offset) {
      let byte = data[offset];
      const type = (byte >> 4) & 0x07;
      let size = byte & 0x0f;
      let shift = 4;
      let off = offset + 1;
      while (byte & 0x80) {
        if (off >= data.length) throw new Error('pack header extends past end of data');
        byte = data[off++];
        size += (byte & 0x7f) * (2 ** shift);
        shift += 7;
      }
      return { type, size, offset: off };
    }

    function readOfsOffset(data, offset) {
      let byte = data[offset++];
      let value = byte & 0x7f;
      while (byte & 0x80) {
        if (offset >= data.length) throw new Error('OFS offset extends past end of data');
        byte = data[offset++];
        value = ((value + 1) * 128) + (byte & 0x7f);
      }
      return { value, offset };
    }

    function findPackStart(buf) {
      const data = new Uint8Array(buf);
      for (let i = 0; i < data.length - 4; i++) {
        if (data[i] === 0x50 && data[i+1] === 0x41 && data[i+2] === 0x43 && data[i+3] === 0x4B) return i;
      }
      return -1;
    }

    const TYPE_NAMES = { 1: 'commit', 2: 'tree', 3: 'blob', 4: 'tag' };

    // --- Full WASM pack extraction (preferred path) ---
    async function parsePackWasmFull(packData) {
      const e = wasmInstance.exports;

      status('WASM: Loading pack...');
      showProgress(20);

      const packPtr = e.ziggit_alloc(packData.length);
      if (!packPtr) throw new Error('WASM alloc failed for pack data');
      new Uint8Array(e.memory.buffer, packPtr, packData.length).set(packData);
      const rc = e.ziggit_load_pack(packPtr, packData.length);
      e.ziggit_free(packPtr, packData.length);
      if (rc !== 0) throw new Error('WASM pack loading failed (rc=' + rc + ')');

      const totalObjects = e.ziggit_pack_object_count();
      if (totalObjects <= 0) throw new Error('WASM: no objects in pack');

      status(`WASM: Extracting ${totalObjects} objects...`);
      showProgress(30);

      // Show pack stats
      try {
        const statsPtr = e.ziggit_alloc(512);
        const statsLen = e.ziggit_pack_stats(statsPtr, 512);
        if (statsLen > 0) {
          const stats = JSON.parse(new TextDecoder().decode(new Uint8Array(e.memory.buffer, statsPtr, statsLen)));
          console.log('WASM pack stats:', stats);
          const diag = document.getElementById('diag-panel');
          diag.style.display = 'block';
          document.getElementById('diag-details').innerHTML =
            `⚡ WASM pack: ${stats.objects} objects (${stats.commits} commits, ${stats.trees} trees, ${stats.blobs} blobs, ${stats.tags} tags, ${stats.ofs_deltas} ofs-deltas, ${stats.ref_deltas} ref-deltas)`;
        }
        e.ziggit_free(statsPtr, 512);
      } catch (_) {}

      // Stream objects one at a time via ziggit_read_object_by_index
      const op = e.ziggit_alloc(4), ol = e.ziggit_alloc(4), tp = e.ziggit_alloc(4), hp = e.ziggit_alloc(40);
      if (!op || !ol || !tp || !hp) throw new Error('WASM alloc failed for object extraction buffers');

      let extracted = 0;
      let errors = 0;

      for (let i = 0; i < totalObjects; i++) {
        const rc2 = e.ziggit_read_object_by_index(i, op, ol, tp, hp);
        if (rc2 !== 0) { errors++; continue; }
        const buf = e.memory.buffer;
        const v = new DataView(buf);
        const dp = v.getUint32(op, true), dl = v.getUint32(ol, true), dt = v.getUint32(tp, true);
        const hash = new TextDecoder().decode(new Uint8Array(buf, hp, 40));
        const data = new Uint8Array(buf, dp, dl).slice();
        e.ziggit_free(dp, dl);
        const typeName = TYPE_NAMES[dt];
        if (typeName) objectDb[hash] = { type: typeName, data };
        extracted++;
        if (extracted % 100 === 0) {
          status(`WASM: Extracted ${extracted}/${totalObjects} objects...`);
          showProgress(30 + (extracted / totalObjects) * 70);
          await new Promise(r => setTimeout(r, 0));
        }
      }
      e.ziggit_free(op, 4); e.ziggit_free(ol, 4); e.ziggit_free(tp, 4); e.ziggit_free(hp, 40);

      showProgress(100);
      const typeCounts = {};
      for (const h of Object.keys(objectDb)) {
        typeCounts[objectDb[h].type] = (typeCounts[objectDb[h].type] || 0) + 1;
      }
      const typeStr = Object.entries(typeCounts).map(([t,c]) => `${c} ${t}s`).join(', ');
      console.log(`WASM extraction: ${Object.keys(objectDb).length} objects (${typeStr}), ${errors} errors`);

      const diag = document.getElementById('diag-panel');
      diag.style.display = 'block';
      document.getElementById('diag-details').innerHTML =
        `⚡ <strong>All git operations in WASM</strong>: ${extracted} objects extracted (${typeStr})` +
        (errors > 0 ? ` — ${errors} errors` : '') +
        ` — zlib, SHA-1, delta resolution all in Zig`;

      return extracted > 0;
    }

    // --- Fallback pack parsing (JS structure walking + WASM for zlib/delta/SHA-1) ---
    async function parsePackWithWasm(packData) {
      status('Parsing pack (WASM-accelerated)...');
      const view = new DataView(packData.buffer, packData.byteOffset, packData.byteLength);
      const version = view.getUint32(4);
      const numObjects = view.getUint32(8);
      status(`Pack v${version}, ${numObjects} objects...`);

      let offset = 12;
      const objects = [];

      for (let i = 0; i < numObjects; i++) {
        if (i % 100 === 0) {
          status(`Parsing object ${i}/${numObjects}...`);
          showProgress((i / numObjects) * 70);
          await new Promise(r => setTimeout(r, 0));
        }
        const objStart = offset;
        const hdr = readVarInt(packData, offset);
        offset = hdr.offset;

        if (hdr.type >= 1 && hdr.type <= 4) {
          const inf = wasmDecompress(packData, offset);
          offset += inf.bytesRead;
          const typeName = TYPE_NAMES[hdr.type];
          const header = new TextEncoder().encode(`${typeName} ${inf.result.length}\0`);
          const full = new Uint8Array(header.length + inf.result.length);
          full.set(header);
          full.set(inf.result, header.length);
          const hash = wasmSha1Hex(full);
          objectDb[hash] = { type: typeName, data: inf.result };
          objects.push({ type: hdr.type, typeName, hash, data: inf.result, packOffset: objStart });
        } else if (hdr.type === 6) {
          const ofs = readOfsOffset(packData, offset);
          offset = ofs.offset;
          const baseOffset = objStart - ofs.value;
          const inf = wasmDecompress(packData, offset);
          offset += inf.bytesRead;
          objects.push({ type: 6, deltaData: inf.result, basePackOffset: baseOffset, packOffset: objStart });
        } else if (hdr.type === 7) {
          const baseHash = bytesToHex(packData.slice(offset, offset + 20));
          offset += 20;
          const inf = wasmDecompress(packData, offset);
          offset += inf.bytesRead;
          objects.push({ type: 7, deltaData: inf.result, baseHash, packOffset: objStart });
        } else {
          throw new Error('Unknown pack object type ' + hdr.type + ' at offset ' + objStart);
        }
      }

      // Build offset->index map for OFS_DELTA resolution
      const offsetToIdx = {};
      objects.forEach((obj, idx) => { offsetToIdx[obj.packOffset] = idx; });

      // Resolve deltas using WASM
      status('Resolving deltas (WASM)...');
      function resolveObject(idx, depth) {
        if (depth > 100) throw new Error('Delta chain too deep (>100 levels)');
        const obj = objects[idx];
        if (obj.hash) return obj;

        let base;
        if (obj.type === 6) {
          const baseIdx = offsetToIdx[obj.basePackOffset];
          if (baseIdx === undefined) throw new Error('OFS_DELTA base not found at offset ' + obj.basePackOffset);
          base = resolveObject(baseIdx, depth + 1);
        } else if (obj.type === 7) {
          if (objectDb[obj.baseHash]) {
            base = { typeName: objectDb[obj.baseHash].type, data: objectDb[obj.baseHash].data };
          } else {
            let baseIdx = objects.findIndex(o => o.hash === obj.baseHash);
            if (baseIdx < 0) throw new Error('REF_DELTA base not found: ' + obj.baseHash);
            base = resolveObject(baseIdx, depth + 1);
          }
        }

        const resolved = wasmApplyDelta(base.data, obj.deltaData);
        obj.typeName = base.typeName;
        obj.data = resolved;
        const header = new TextEncoder().encode(`${obj.typeName} ${resolved.length}\0`);
        const full = new Uint8Array(header.length + resolved.length);
        full.set(header);
        full.set(resolved, header.length);
        obj.hash = wasmSha1Hex(full);
        objectDb[obj.hash] = { type: obj.typeName, data: obj.data };
        return obj;
      }

      let resolved = 0;
      for (let i = 0; i < objects.length; i++) {
        if (!objects[i].hash) {
          resolveObject(i, 0);
          resolved++;
          if (resolved % 50 === 0) {
            status(`Resolving deltas ${resolved}...`);
            showProgress(70 + (resolved / objects.length) * 30);
            await new Promise(r => setTimeout(r, 0));
          }
        }
      }

      showProgress(100);
      const typeCounts = {};
      for (const h of Object.keys(objectDb)) {
        typeCounts[objectDb[h].type] = (typeCounts[objectDb[h].type] || 0) + 1;
      }
      const typeStr = Object.entries(typeCounts).map(([t,c]) => `${c} ${t}s`).join(', ');
      status(`Parsed ${numObjects} objects: ${typeStr}`);

      const diag = document.getElementById('diag-panel');
      diag.style.display = 'block';
      document.getElementById('diag-details').innerHTML =
        `⚡ <strong>WASM-accelerated</strong>: ${Object.keys(objectDb).length} objects (${typeStr}) — zlib, SHA-1, delta all in Zig`;
    }

    // --- Sideband extraction (network protocol framing) ---
    function extractFromSideband(data) {
      const chunks = [];
      let pos = 0;
      let foundPack = false;

      while (pos + 4 <= data.length) {
        const lenHex = String.fromCharCode(data[pos], data[pos+1], data[pos+2], data[pos+3]);
        if (lenHex === '0000' || lenHex === '0001' || lenHex === '0002') { pos += 4; continue; }
        if (!/^[0-9a-f]{4}$/i.test(lenHex)) break;
        const len = parseInt(lenHex, 16);
        if (len < 4 || pos + len > data.length) break;
        const payload = data.slice(pos + 4, pos + len);
        pos += len;
        if (payload.length === 0) continue;
        const payloadStr = new TextDecoder().decode(payload);
        if (payloadStr.startsWith('NAK') || payloadStr.startsWith('ACK')) { continue; }
        const channel = payload[0];
        if (channel === 1) { chunks.push(payload.slice(1)); foundPack = true; }
        else if (channel === 2) { console.log('git progress:', new TextDecoder().decode(payload.slice(1)).trim()); }
        else if (channel === 3) { console.error('git error:', new TextDecoder().decode(payload.slice(1))); }
      }

      if (!foundPack || chunks.length === 0) return null;
      const totalLen = chunks.reduce((s, c) => s + c.length, 0);
      const result = new Uint8Array(totalLen);
      let offset = 0;
      for (const chunk of chunks) { result.set(chunk, offset); offset += chunk.length; }
      if (result[0] === 0x50 && result[1] === 0x41 && result[2] === 0x43 && result[3] === 0x4B) return result;
      const packIdx = findPackStart(result);
      if (packIdx >= 0) return result.slice(packIdx);
      return null;
    }

    // --- Clone ---
    async function doClone() {
      const repoUrl = document.getElementById('url').value.trim().replace(/\.git$/, '').replace(/\/$/, '');
      const corsProxy = document.getElementById('corsProxy').value.trim();
      if (!repoUrl) return status('Enter a URL', true);

      // Wait for WASM to load
      try {
        await wasmReady;
      } catch (e) {
        return status('WASM failed to load — cannot clone without it', true);
      }

      const btn = document.getElementById('cloneBtn');
      btn.disabled = true;

      // Clear previous state
      Object.keys(objectDb).forEach(k => delete objectDb[k]);
      currentCommit = null;
      document.getElementById('repo-info').style.display = 'none';
      document.getElementById('log-panel').style.display = 'none';
      document.getElementById('tree-panel').style.display = 'none';
      document.getElementById('file-panel').style.display = 'none';
      document.getElementById('commit-panel').style.display = 'none';

      const t0 = performance.now();
      try {
        // 1. Fetch refs
        status('Fetching refs...');

        function proxyUrl(url) {
          if (!corsProxy) return url;
          if (corsProxy.includes('?url=') || corsProxy.endsWith('?')) return corsProxy + encodeURIComponent(url);
          if (corsProxy.endsWith('/')) return corsProxy + url;
          return corsProxy + '/' + url;
        }

        let refsText, baseUrl;
        for (const suffix of ['.git', '']) {
          const tryUrl = repoUrl + suffix;
          const refsUrl = proxyUrl(tryUrl + '/info/refs?service=git-upload-pack');
          try {
            const refsResp = await fetch(refsUrl);
            if (refsResp.ok) {
              const text = await refsResp.text();
              if (text.includes('service=git-upload-pack') || text.match(/[0-9a-f]{40}/)) {
                refsText = text;
                baseUrl = tryUrl;
                break;
              }
            }
          } catch (e) { console.log('Fetch failed for', tryUrl, e); }
        }
        if (!refsText) throw new Error('Failed to fetch refs. Check that the repository URL is correct and public.');

        const refs = parsePktLineRefs(refsText);
        const headHash = refs['HEAD'];
        if (!headHash) throw new Error('No HEAD ref found');
        showProgress(5);
        status(`HEAD: ${headHash.slice(0, 8)}. Fetching pack...`);

        // 2. Request pack (WASM builds the want request)
        const packBody = buildWantRequest(headHash);
        const packResp = await fetch(proxyUrl(baseUrl + '/git-upload-pack'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-git-upload-pack-request',
            'Accept': 'application/x-git-upload-pack-result',
          },
          body: packBody
        });
        if (!packResp.ok) {
          throw new Error('Failed to fetch pack: HTTP ' + packResp.status + ' ' + packResp.statusText);
        }

        const packBytes = new Uint8Array(await packResp.arrayBuffer());
        const dlSize = formatSize(packBytes.length);
        if (packBytes.length < 20) throw new Error('Pack response too small (' + packBytes.length + ' bytes)');

        const firstBytes = String.fromCharCode(...packBytes.subarray(0, Math.min(50, packBytes.length)));
        if (firstBytes.startsWith('{"error') || firstBytes.startsWith('<!DOCTYPE') || firstBytes.startsWith('<html')) {
          throw new Error('Proxy returned error page instead of pack data');
        }

        showProgress(15);
        status(`Downloaded ${dlSize}. Extracting pack...`);

        // 3. Extract pack data from sideband framing (WASM first, then JS sideband parser)
        let packData = wasmExtractPack(packBytes);
        if (!packData) packData = extractFromSideband(packBytes);
        if (!packData) {
          const packStart = findPackStart(packBytes);
          if (packStart >= 0) packData = packBytes.slice(packStart);
          else throw new Error('PACK signature not found in response');
        }

        console.log('Pack data:', formatSize(packData.length));

        // 4. Parse pack — WASM does all git operations
        let extracted = false;
        try {
          extracted = await parsePackWasmFull(packData);
        } catch (e) {
          console.warn('Full WASM extraction failed, using WASM-accelerated fallback:', e.message);
          await parsePackWithWasm(packData);
          extracted = true;
        }

        // 5. Display results
        currentCommit = headHash;
        const commit = objectDb[headHash];
        if (!commit) throw new Error('HEAD commit not in object database');

        const info = document.getElementById('repo-info');
        info.style.display = 'block';

        let branchName = 'detached';
        for (const [ref, hash] of Object.entries(refs)) {
          if (hash === headHash && ref.startsWith('refs/heads/')) {
            branchName = ref.replace('refs/heads/', '');
            break;
          }
        }

        const tags = Object.keys(refs).filter(r => r.startsWith('refs/tags/')).map(r => r.replace('refs/tags/', ''));
        const tagInfo = tags.length > 0 ? ` &nbsp; <strong>Tags:</strong> ${tags.slice(0, 5).map(t => escHtml(t)).join(', ')}${tags.length > 5 ? ' (+' + (tags.length - 5) + ' more)' : ''}` : '';

        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

        document.getElementById('repo-details').innerHTML =
          `<strong>Branch:</strong> ${escHtml(branchName)} &nbsp; ` +
          `<strong>HEAD:</strong> <span class="hash" onclick="inspectCommit('${headHash}')">${headHash.slice(0,12)}</span> &nbsp; ` +
          `<strong>Objects:</strong> ${Object.keys(objectDb).length} &nbsp; ` +
          `<strong>Downloaded:</strong> ${dlSize} &nbsp; ` +
          `<span class="timing">Cloned in ${elapsed}s</span>` + tagInfo +
          ` &nbsp; <span class="info">⚡ All git ops in WASM (142 KB)</span>`;

        showLog(headHash);
        const parsed = parseCommit(commit.data);
        if (parsed.tree) showTree(parsed.tree, '/');

        showProgress(-1);
        status(`Ready! ${Object.keys(objectDb).length} objects cloned in ${elapsed}s. Click folders to browse.`);
      } catch (e) {
        showProgress(-1);
        status('Error: ' + e.message, true);
        console.error(e);
      }
      btn.disabled = false;
    }

    // --- Display ---
    function showLog(headHash) {
      const panel = document.getElementById('log-panel');
      panel.style.display = 'block';
      const tbody = document.querySelector('#log-table tbody');
      tbody.innerHTML = '';

      // Use WASM commit walker
      const commits = wasmWalkCommits(headHash, 50);
      if (commits && commits.length > 0) {
        for (const c of commits) {
          const authorShort = (c.author || '').replace(/<[^>]+>.*/, '').trim();
          const msgShort = (c.message || '').slice(0, 80);
          const tr = document.createElement('tr');
          tr.innerHTML =
            `<td><span class="hash" onclick="inspectCommit('${c.hash}')">${c.hash.slice(0, 8)}</span></td>` +
            `<td>${escHtml(authorShort)}</td>` +
            `<td>${escHtml(msgShort)}</td>`;
          tbody.appendChild(tr);
        }
        return;
      }

      // Walk commits from objectDb (data already extracted by WASM)
      let hash = headHash;
      let count = 0;
      while (hash && count < 50) {
        const obj = objectDb[hash];
        if (!obj || obj.type !== 'commit') break;
        const c = parseCommit(obj.data);
        const authorShort = c.author.replace(/<[^>]+>.*/, '').trim();
        const msgShort = c.message.split('\n')[0].slice(0, 80);
        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td><span class="hash" onclick="inspectCommit('${hash}')">${hash.slice(0, 8)}</span></td>` +
          `<td>${escHtml(authorShort)}</td>` +
          `<td>${escHtml(msgShort)}</td>`;
        tbody.appendChild(tr);
        hash = c.parents[0] || null;
        count++;
      }
    }

    function showTree(treeHash, path) {
      const obj = objectDb[treeHash];
      if (!obj || obj.type !== 'tree') { status('Tree not found: ' + treeHash, true); return; }

      const entries = parseTree(obj.data);
      const panel = document.getElementById('tree-panel');
      panel.style.display = 'block';
      const searchBox = document.getElementById('search');
      searchBox.style.display = 'block';
      searchBox.value = '';

      // Breadcrumb
      const bc = document.getElementById('tree-breadcrumb');
      const parts = path.split('/').filter(Boolean);
      let bcHtml = `<a onclick="showTreeFromCommit()">root</a>`;
      if (parts.length > 0 && currentCommit && objectDb[currentCommit]) {
        let walkHash = parseCommit(objectDb[currentCommit].data).tree;
        for (let pi = 0; pi < parts.length; pi++) {
          if (pi < parts.length - 1 && walkHash && objectDb[walkHash]) {
            const segEntries = parseTree(objectDb[walkHash].data);
            const child = segEntries.find(e => e.name === parts[pi] && e.type === 'tree');
            if (child) {
              const segPath = '/' + parts.slice(0, pi + 1).join('/') + '/';
              bcHtml += ` / <a onclick="showTree('${child.hash}', '${segPath}')">${escHtml(parts[pi])}</a>`;
              walkHash = child.hash;
            } else {
              bcHtml += ` / ${escHtml(parts[pi])}`;
              walkHash = null;
            }
          } else {
            bcHtml += ` / ${escHtml(parts[pi])}`;
          }
        }
      }
      bc.innerHTML = bcHtml;

      const tbody = document.querySelector('#tree-table tbody');
      tbody.innerHTML = '';

      const typeOrder = { tree: 0, commit: 1, blob: 2 };
      entries.sort((a, b) => {
        const ta = typeOrder[a.type] ?? 2, tb = typeOrder[b.type] ?? 2;
        if (ta !== tb) return ta - tb;
        return a.name.localeCompare(b.name);
      });

      entries.forEach(e => {
        const tr = document.createElement('tr');
        const safeName = e.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        let nameClass, onclick;
        if (e.type === 'tree') {
          nameClass = 'tree-link';
          onclick = `showTree('${e.hash}', '${path}${safeName}/')`;
        } else if (e.type === 'commit') {
          nameClass = 'info';
          onclick = '';
        } else {
          nameClass = 'blob-link';
          onclick = `showFile('${e.hash}', '${safeName}')`;
        }
        let sizeStr = '';
        if (e.type === 'blob' && objectDb[e.hash]) {
          sizeStr = formatSize(objectDb[e.hash].data.length);
        } else if (e.type === 'tree' && objectDb[e.hash]) {
          sizeStr = parseTree(objectDb[e.hash].data).length + ' items';
        } else if (e.type === 'commit') {
          sizeStr = 'submodule';
        }
        tr.innerHTML =
          `<td class="info">${e.mode}</td>` +
          `<td class="info">${e.type}</td>` +
          `<td><span class="${nameClass}"${onclick ? ` onclick="${onclick}"` : ''}>${escHtml(e.name)}</span></td>` +
          `<td class="info">${sizeStr}</td>` +
          `<td><span class="hash" title="${e.hash}">${e.hash.slice(0, 8)}</span></td>`;
        tbody.appendChild(tr);
      });

      // Auto-show README
      const readme = entries.find(e => e.type === 'blob' && /^readme/i.test(e.name));
      if (readme && objectDb[readme.hash]) showFile(readme.hash, readme.name);
    }

    function showTreeFromCommit() {
      if (!currentCommit || !objectDb[currentCommit]) return;
      const c = parseCommit(objectDb[currentCommit].data);
      if (c.tree) showTree(c.tree, '/');
    }

    function isBinary(data) {
      const check = Math.min(data.length, 8192);
      for (let i = 0; i < check; i++) { if (data[i] === 0) return true; }
      return false;
    }

    function downloadFile(blobHash, name) {
      const obj = objectDb[blobHash];
      if (!obj) return;
      const blob = new Blob([obj.data]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    function showFile(blobHash, name) {
      const obj = objectDb[blobHash];
      if (!obj) { status('Blob not found: ' + blobHash, true); return; }
      const panel = document.getElementById('file-panel');
      panel.style.display = 'block';
      document.getElementById('file-name').innerHTML = escHtml(name) + ' (' + formatSize(obj.data.length) + ') <button onclick="downloadFile(\'' + blobHash + '\', \'' + name.replace(/'/g, "\\'") + '\')" style="font-size:0.8em;padding:2px 8px">⬇ Download</button>';
      const contentEl = document.getElementById('file-content');
      if (isBinary(obj.data)) {
        const ext = name.split('.').pop().toLowerCase();
        if (['png','jpg','jpeg','gif','webp','svg','ico','bmp'].includes(ext)) {
          const mime = ext === 'svg' ? 'image/svg+xml' : `image/${ext === 'jpg' ? 'jpeg' : ext}`;
          const blob = new Blob([obj.data], { type: mime });
          const url = URL.createObjectURL(blob);
          contentEl.innerHTML = `<img src="${url}" style="max-width:100%;max-height:400px;" alt="${escHtml(name)}">`;
        } else {
          contentEl.textContent = `[Binary file, ${formatSize(obj.data.length)}]`;
        }
      } else {
        const text = new TextDecoder('utf-8', { fatal: false }).decode(obj.data);
        const displayText = text.length > 200000 ? text.slice(0, 200000) + '\n... (truncated)' : text;
        const lines = displayText.split('\n');
        if (lines.length > 1) {
          const nums = lines.map((_, i) => i + 1).join('\n');
          contentEl.innerHTML = `<div class="line-numbers"><div class="nums">${nums}</div><div class="code">${escHtml(displayText)}</div></div>`;
        } else {
          contentEl.textContent = displayText;
        }
      }
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function inspectCommit(hash) {
      currentCommit = hash;
      const obj = objectDb[hash];
      if (!obj) { status('Commit not found', true); return; }
      const c = parseCommit(obj.data);
      if (c.tree) showTree(c.tree, '/');
      showCommitDetails(hash, c);
      status('Viewing commit ' + hash.slice(0, 8));
    }

    function flattenTree(treeHash, prefix) {
      const obj = objectDb[treeHash];
      if (!obj || obj.type !== 'tree') return {};
      const entries = parseTree(obj.data);
      const files = {};
      for (const e of entries) {
        const path = prefix ? prefix + '/' + e.name : e.name;
        if (e.type === 'tree') Object.assign(files, flattenTree(e.hash, path));
        else if (e.type === 'blob') files[path] = e.hash;
      }
      return files;
    }

    function showCommitDetails(hash, commit) {
      const panel = document.getElementById('commit-panel');
      panel.style.display = 'block';
      document.getElementById('commit-hash').textContent = hash.slice(0, 12);

      let html = `<div class="info" style="margin-bottom:8px">`;
      html += `<strong>Author:</strong> ${escHtml(commit.author)}<br>`;
      html += `<strong>Message:</strong> ${escHtml(commit.message.split('\n')[0])}`;
      if (commit.parents.length) html += `<br><strong>Parent:</strong> <span class="hash" onclick="inspectCommit('${commit.parents[0]}')">${commit.parents[0].slice(0,8)}</span>`;
      html += `</div>`;

      if (commit.parents.length > 0 && objectDb[commit.parents[0]]) {
        const parentCommit = parseCommit(objectDb[commit.parents[0]].data);
        if (parentCommit.tree && commit.tree) {
          const oldFiles = flattenTree(parentCommit.tree, '');
          const newFiles = flattenTree(commit.tree, '');
          const allPaths = new Set([...Object.keys(oldFiles), ...Object.keys(newFiles)]);
          const changes = [];
          for (const path of [...allPaths].sort()) {
            const oh = oldFiles[path], nh = newFiles[path];
            if (!oh) changes.push({ path, status: 'A', color: '#7ee787' });
            else if (!nh) changes.push({ path, status: 'D', color: '#f85149' });
            else if (oh !== nh) changes.push({ path, status: 'M', color: '#d29922' });
          }
          if (changes.length > 0) {
            html += `<div style="margin-top:8px"><strong>${changes.length} file${changes.length>1?'s':''} changed:</strong></div>`;
            html += `<div style="max-height:200px;overflow-y:auto;margin-top:4px;font-size:0.85em">`;
            for (const c of changes) html += `<div><span style="color:${c.color};font-weight:bold;width:20px;display:inline-block">${c.status}</span> ${escHtml(c.path)}</div>`;
            html += `</div>`;
          } else {
            html += `<div class="info">No file changes detected</div>`;
          }
        }
      } else if (commit.parents.length === 0) {
        html += `<div class="info">Initial commit</div>`;
      }

      document.getElementById('commit-details').innerHTML = html;
    }

    function filterTree() {
      const q = document.getElementById('search').value.toLowerCase();
      document.querySelectorAll('#tree-table tbody tr').forEach(row => {
        const name = row.querySelector('td:nth-child(3)');
        if (name) row.style.display = name.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    }
  </script>
</body>
</html>
