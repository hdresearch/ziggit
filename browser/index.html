<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ziggit — Git Clone in Browser</title>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; padding: 20px; line-height: 1.6; }
    h1 { color: #58a6ff; margin-bottom: 4px; font-size: 1.4em; }
    .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 0.85em; }
    .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
    input[type="text"] { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-family: inherit; font-size: 0.9em; }
    #url { width: 460px; }
    #corsProxy { width: 300px; }
    button { background: #238636; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.9em; }
    button:hover { background: #2ea043; }
    button:disabled { background: #30363d; cursor: not-allowed; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #30363d; border-top-color: #f0883e; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { color: #f0883e; font-size: 0.85em; min-height: 1.4em; }
    .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 12px; overflow: auto; }
    .panel h2 { color: #58a6ff; font-size: 1em; margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px; }
    #log-panel, #tree-panel, #file-panel { max-height: 400px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th { text-align: left; color: #8b949e; padding: 4px 8px; border-bottom: 1px solid #21262d; }
    td { padding: 4px 8px; border-bottom: 1px solid #21262d; }
    tr:hover { background: #1c2128; }
    .hash { color: #f0883e; cursor: pointer; }
    .hash:hover { text-decoration: underline; }
    .tree-link { color: #58a6ff; cursor: pointer; }
    .tree-link:hover { text-decoration: underline; }
    .blob-link { color: #7ee787; cursor: pointer; }
    .blob-link:hover { text-decoration: underline; }
    pre.file-content { white-space: pre-wrap; word-break: break-all; color: #c9d1d9; font-size: 0.85em; max-height: 500px; overflow: auto; }
    .info { color: #8b949e; font-size: 0.85em; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } #url { width: 100%; } }
    .breadcrumb { color: #8b949e; font-size: 0.85em; margin-bottom: 8px; }
    .breadcrumb a { color: #58a6ff; cursor: pointer; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .progress-bar { background: #21262d; border-radius: 4px; height: 6px; margin: 8px 0; overflow: hidden; display: none; }
    .progress-fill { background: #58a6ff; height: 100%; width: 0%; transition: width 0.2s; }
    .stats { color: #8b949e; font-size: 0.8em; margin-top: 4px; }
    #search { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 0.85em; width: 200px; margin-bottom: 8px; display: none; }
    #search::placeholder { color: #484f58; }
    .timing { color: #7ee787; font-size: 0.8em; }
    #file-panel { max-height: 600px; }
    .line-numbers { display: flex; font-size: 0.85em; }
    .line-numbers .nums { color: #484f58; text-align: right; padding-right: 12px; border-right: 1px solid #30363d; margin-right: 12px; user-select: none; white-space: pre; }
    .line-numbers .code { white-space: pre-wrap; word-break: break-all; flex: 1; overflow-x: auto; }
    .submodule-link { color: #d2a8ff; cursor: default; }
    .submodule-link::before { content: '📦 '; }
    #commit-panel { max-height: 350px; overflow-y: auto; }
    .change-added { color: #7ee787; }
    .change-deleted { color: #f85149; }
    .change-modified { color: #d29922; }
  </style>
</head>
<body>
  <h1>⚡ ziggit</h1>
  <p class="subtitle">A pure Zig git implementation — clone &amp; browse repos in the browser &bull; <span id="wasm-version" class="info">loading wasm...</span></p>

  <div class="row">
    <input type="text" id="corsProxy" placeholder="CORS proxy URL" value="https://corsproxy.io/?">
    <span class="info">CORS proxy prefix</span>
  </div>
  <div class="row">
    <input type="text" id="url" value="https://github.com/nicolo-ribaudo/jest-light-runner" placeholder="Repository URL" onkeydown="if(event.key==='Enter')doClone()">
    <button id="cloneBtn" onclick="doClone()">Clone</button>
    <span id="status"></span>
  </div>
  <div class="progress-bar" id="progress"><div class="progress-fill" id="progress-fill"></div></div>

  <div id="repo-info" class="panel" style="display:none">
    <h2>Repository</h2>
    <div id="repo-details"></div>
  </div>

  <div class="panels">
    <div id="log-panel" class="panel" style="display:none">
      <h2>Commit Log</h2>
      <table id="log-table"><thead><tr><th>Hash</th><th>Author</th><th>Message</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="tree-panel" class="panel" style="display:none">
      <h2>Files</h2>
      <input type="text" id="search" placeholder="Filter files..." oninput="filterTree()">
      <div id="tree-breadcrumb" class="breadcrumb"></div>
      <table id="tree-table"><thead><tr><th>Mode</th><th>Type</th><th>Name</th><th>Size</th><th>Hash</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div id="commit-panel" class="panel" style="display:none">
    <h2>Commit: <span id="commit-hash" class="hash"></span></h2>
    <div id="commit-details"></div>
  </div>

  <div id="file-panel" class="panel" style="display:none">
    <h2>File: <span id="file-name"></span></h2>
    <pre class="file-content" id="file-content"></pre>
  </div>

  <script>
    // Load WASM module — provides zlib decompression, SHA-1, delta application
    let wasmInstance = null;
    (async function() {
      try {
        const noopFn = () => {};
        const noopRet = () => 0;
        const env = {
          host_write_stdout: noopFn, host_write_stderr: noopFn,
          host_write_file: noopRet, host_read_file: noopRet,
          host_file_exists: noopRet, host_make_dir: noopRet,
          host_delete_file: noopRet, host_get_cwd: noopRet,
          host_http_get: noopRet, host_http_post: noopRet,
        };
        const resp = await fetch('ziggit.wasm');
        const { instance } = await WebAssembly.instantiateStreaming(resp, { env });
        wasmInstance = instance;
        const mem = instance.exports.memory;
        const ptr = instance.exports.ziggit_alloc(128);
        const len = instance.exports.ziggit_version(ptr, 128);
        const ver = new TextDecoder().decode(new Uint8Array(mem.buffer, ptr, len));
        instance.exports.ziggit_free(ptr, 128);
        const numExports = Object.keys(instance.exports).filter(k => typeof instance.exports[k] === 'function').length;
        document.getElementById('wasm-version').textContent = `${ver} (${numExports} exports, WASM active)`;
        console.log('WASM loaded:', ver, '— exports:', Object.keys(instance.exports).filter(k => typeof instance.exports[k] === 'function'));
      } catch (e) {
        document.getElementById('wasm-version').textContent = 'wasm not loaded (JS fallback active)';
        console.warn('WASM load failed:', e);
      }
    })();

    // Object database: sha1 hex -> { type: string, data: Uint8Array }
    const objectDb = {};
    let currentCommit = null;

    function status(msg, isError) {
      const el = document.getElementById('status');
      el.style.color = isError ? '#f85149' : '#f0883e';
      if (!isError && msg && !msg.startsWith('Ready!') && !msg.startsWith('Viewing')) {
        el.innerHTML = '<span class="spinner"></span>' + escHtml(msg);
      } else {
        el.textContent = msg;
      }
    }

    function showProgress(pct) {
      const bar = document.getElementById('progress');
      const fill = document.getElementById('progress-fill');
      if (pct < 0) { bar.style.display = 'none'; return; }
      bar.style.display = 'block';
      fill.style.width = Math.min(100, pct) + '%';
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // --- SHA-1 ---
    async function sha1hex(data) {
      // Use WASM SHA-1 if available (synchronous, avoids async overhead)
      if (wasmInstance) {
        const result = wasmSha1Hex(data);
        if (result) return result;
        // Fall through to Web Crypto if WASM alloc failed
      }
      const hash = await crypto.subtle.digest('SHA-1', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function wasmSha1Hex(data) {
      const e = wasmInstance.exports;
      const ptr = e.ziggit_alloc(data.length);
      if (!ptr) return null;
      const hashPtr = e.ziggit_alloc(20);
      if (!hashPtr) { e.ziggit_free(ptr, data.length); return null; }
      // Write data after all allocations (memory may have grown)
      new Uint8Array(e.memory.buffer, ptr, data.length).set(data);
      e.ziggit_sha1(ptr, data.length, hashPtr);
      // Read result (sha1 doesn't allocate, buffer is stable)
      const hex = bytesToHex(new Uint8Array(e.memory.buffer, hashPtr, 20));
      e.ziggit_free(ptr, data.length);
      e.ziggit_free(hashPtr, 20);
      return hex;
    }

    function bytesToHex(bytes) {
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --- Pkt-line ref parsing ---
    function parsePktLineRefs(text) {
      // Parse git smart HTTP pkt-line ref discovery response
      const refs = {};
      let pos = 0;
      while (pos + 4 <= text.length) {
        const lenHex = text.substring(pos, pos + 4);
        if (lenHex === '0000') { pos += 4; continue; } // flush
        const pktLen = parseInt(lenHex, 16);
        if (isNaN(pktLen) || pktLen < 4) break;
        if (pos + pktLen > text.length) break;
        const line = text.substring(pos + 4, pos + pktLen);
        pos += pktLen;
        // Skip service announcement
        if (line.startsWith('#')) continue;
        // Parse: "<40-hex> <refname>[\0capabilities]\n"
        const match = line.match(/^([0-9a-f]{40}) ([^\s\0\n]+)/);
        if (match) {
          refs[match[2]] = match[1];
        }
      }
      return refs;
    }

    // --- Build want request ---
    function buildWantRequest(hash) {
      // want line with capabilities
      const wantLine = `want ${hash} side-band-64k ofs-delta no-progress include-tag no-thin agent=ziggit-browser\n`;
      const pktWant = (wantLine.length + 4).toString(16).padStart(4, '0') + wantLine;
      return pktWant + '00000009done\n';
    }

    // --- Find PACK signature in response ---
    function findPackStart(buf) {
      const data = new Uint8Array(buf);
      // The response may have sideband framing or NAK lines before PACK
      // Look for 'PACK' signature
      for (let i = 0; i < data.length - 4; i++) {
        if (data[i] === 0x50 && data[i+1] === 0x41 && data[i+2] === 0x43 && data[i+3] === 0x4B) {
          return i;
        }
      }
      return -1;
    }

    // --- Pack parser ---
    function readVarInt(data, offset) {
      // First byte: bits 6-4 = type (only for first byte), bits 3-0 = size start
      // MSB = continuation bit
      let byte = data[offset];
      const type = (byte >> 4) & 0x07;
      let size = byte & 0x0f;
      let shift = 4;
      let off = offset + 1;
      while (byte & 0x80) {
        byte = data[off++];
        size |= (byte & 0x7f) << shift;
        shift += 7;
      }
      return { type, size, offset: off };
    }

    function readOfsOffset(data, offset) {
      // Variable-length offset encoding for OFS_DELTA
      let byte = data[offset++];
      let value = byte & 0x7f;
      while (byte & 0x80) {
        byte = data[offset++];
        value = ((value + 1) << 7) | (byte & 0x7f);
      }
      return { value, offset };
    }

    function smartInflate(data, offset) {
      // Git pack uses zlib format:
      //   CMF (1 byte) + FLG (1 byte) + [DICTID (4 bytes if FLG.FDICT)] + deflate data + ADLER32 (4 bytes)
      // We MUST use raw mode because pack objects have trailing data (next object)
      // and pako's zlib mode errors with Z_DATA_ERROR on trailing bytes.

      // Try WASM decompression first (faster, handles byte tracking natively)
      if (wasmInstance) {
        try {
          const e = wasmInstance.exports;
          const inputLen = data.length - offset;
          const inputPtr = e.ziggit_alloc(inputLen);
          if (inputPtr) {
            // Allocate all output pointers before writing data (memory may grow)
            const outPtrPtr = e.ziggit_alloc(4);
            const outLenPtr = e.ziggit_alloc(4);
            const consumedPtr = e.ziggit_alloc(4);
            // Now write input data (after all allocations, buffer is stable)
            new Uint8Array(e.memory.buffer, inputPtr, inputLen).set(data.subarray(offset));
            const rc = e.ziggit_zlib_decompress(inputPtr, inputLen, outPtrPtr, outLenPtr, consumedPtr);
            if (rc === 0) {
              // Re-read memory.buffer after WASM call (may have grown)
              const buf = e.memory.buffer;
              const view = new DataView(buf);
              const resultPtr = view.getUint32(outPtrPtr, true);
              const resultLen = view.getUint32(outLenPtr, true);
              const consumed = view.getUint32(consumedPtr, true);
              const result = new Uint8Array(buf, resultPtr, resultLen).slice();
              e.ziggit_free(inputPtr, inputLen);
              e.ziggit_free(outPtrPtr, 4);
              e.ziggit_free(outLenPtr, 4);
              e.ziggit_free(consumedPtr, 4);
              e.ziggit_free(resultPtr, resultLen);
              return { result, bytesRead: consumed };
            }
            e.ziggit_free(inputPtr, inputLen);
            e.ziggit_free(outPtrPtr, 4);
            e.ziggit_free(outLenPtr, 4);
            e.ziggit_free(consumedPtr, 4);
          }
        } catch (e) { /* fall through to pako */ }
      }

      // Fallback: pako in raw mode
      if (offset + 2 > data.length) throw new Error('inflate: not enough data at offset ' + offset);
      const cmf = data[offset];
      const flg = data[offset + 1];
      // Validate zlib header: (CMF*256 + FLG) must be a multiple of 31
      if ((cmf * 256 + flg) % 31 !== 0) {
        throw new Error('inflate: invalid zlib header at offset ' + offset + ' (cmf=' + cmf + ' flg=' + flg + ')');
      }
      const hasDict = (flg & 0x20) !== 0;
      const headerSize = 2 + (hasDict ? 4 : 0);
      const rawData = data.subarray(offset + headerSize);

      try {
        const inf = new pako.Inflate({ raw: true });
        inf.push(rawData, true);
        if (inf.err === 0 && inf.result instanceof Uint8Array && inf.strm) {
          // bytesRead = zlib header + raw deflate bytes consumed + ADLER32 (4 bytes)
          return { result: inf.result, bytesRead: headerSize + inf.strm.total_in + 4 };
        }
        throw new Error('inflate failed: pako error ' + inf.err + ' ' + (inf.msg || ''));
      } catch (e) {
        if (e.message && e.message.startsWith('inflate')) throw e;
        throw new Error('inflate error at offset ' + offset + ': ' + e.message);
      }
    }

    const TYPE_NAMES = { 1: 'commit', 2: 'tree', 3: 'blob', 4: 'tag' };

    function applyDelta(base, delta) {
      let pos = 0;
      // Read base size (variable length)
      let baseSize = 0, shift = 0, byte;
      do {
        byte = delta[pos++];
        baseSize |= (byte & 0x7f) << shift;
        shift += 7;
      } while (byte & 0x80);

      // Read result size
      let resultSize = 0;
      shift = 0;
      do {
        byte = delta[pos++];
        resultSize |= (byte & 0x7f) << shift;
        shift += 7;
      } while (byte & 0x80);

      const result = new Uint8Array(resultSize);
      let resultPos = 0;

      while (pos < delta.length) {
        const cmd = delta[pos++];
        if (cmd & 0x80) {
          // Copy from base
          let copyOff = 0, copySize = 0;
          if (cmd & 0x01) copyOff = delta[pos++];
          if (cmd & 0x02) copyOff |= delta[pos++] << 8;
          if (cmd & 0x04) copyOff |= delta[pos++] << 16;
          if (cmd & 0x08) copyOff |= delta[pos++] << 24;
          if (cmd & 0x10) copySize = delta[pos++];
          if (cmd & 0x20) copySize |= delta[pos++] << 8;
          if (cmd & 0x40) copySize |= delta[pos++] << 16;
          if (copySize === 0) copySize = 0x10000;
          result.set(base.slice(copyOff, copyOff + copySize), resultPos);
          resultPos += copySize;
        } else if (cmd > 0) {
          // Insert literal
          result.set(delta.slice(pos, pos + cmd), resultPos);
          resultPos += cmd;
          pos += cmd;
        } else {
          throw new Error('unexpected delta cmd 0');
        }
      }

      return result;
    }

    async function parsePack(packData) {
      status('Parsing pack file...');
      const view = new DataView(packData.buffer, packData.byteOffset, packData.byteLength);

      // Header: PACK + version(4) + numObjects(4)
      const version = view.getUint32(4);
      const numObjects = view.getUint32(8);
      status(`Pack v${version}, ${numObjects} objects. Parsing...`);

      let offset = 12;
      // First pass: parse all objects, store raw data
      const objects = []; // { type, data, offset, baseOfsOffset?, baseRef? }

      let parseErrors = 0;
      for (let i = 0; i < numObjects; i++) {
        if (i % 100 === 0) {
          status(`Parsing object ${i}/${numObjects}...`);
          showProgress((i / numObjects) * 70);
          await new Promise(r => setTimeout(r, 0)); // yield to UI
        }
        const objStart = offset;
        try {
          const hdr = readVarInt(packData, offset);
          offset = hdr.offset;

          if (hdr.type >= 1 && hdr.type <= 4) {
            // Regular object
            const inf = smartInflate(packData, offset);
            offset += inf.bytesRead;
            const typeName = TYPE_NAMES[hdr.type];
            // Compute SHA1
            const header = new TextEncoder().encode(`${typeName} ${inf.result.length}\0`);
            const full = new Uint8Array(header.length + inf.result.length);
            full.set(header);
            full.set(inf.result, header.length);
            const hash = await sha1hex(full);
            objectDb[hash] = { type: typeName, data: inf.result };
            objects.push({ type: hdr.type, typeName, hash, data: inf.result, packOffset: objStart });
          } else if (hdr.type === 6) {
            // OFS_DELTA
            const ofs = readOfsOffset(packData, offset);
            offset = ofs.offset;
            const baseOffset = objStart - ofs.value;
            const inf = smartInflate(packData, offset);
            offset += inf.bytesRead;
            objects.push({ type: 6, deltaData: inf.result, basePackOffset: baseOffset, packOffset: objStart });
          } else if (hdr.type === 7) {
            // REF_DELTA
            const baseHash = bytesToHex(packData.slice(offset, offset + 20));
            offset += 20;
            const inf = smartInflate(packData, offset);
            offset += inf.bytesRead;
            objects.push({ type: 7, deltaData: inf.result, baseHash, packOffset: objStart });
          } else {
            console.warn('Unknown pack object type:', hdr.type, 'at offset', objStart);
            parseErrors++;
            break; // Unknown type means we can't calculate the next offset
          }
        } catch (e) {
          console.error('Error parsing object', i, 'at offset', objStart, ':', e.message);
          parseErrors++;
          break; // Can't recover from inflate errors since offset is lost
        }
      }
      if (parseErrors > 0) console.warn('Pack parse errors:', parseErrors);

      // Build offset->index map for OFS_DELTA resolution
      const offsetToIdx = {};
      objects.forEach((obj, idx) => { offsetToIdx[obj.packOffset] = idx; });

      // Resolve deltas
      status('Resolving deltas...');
      function resolveObject(idx) {
        const obj = objects[idx];
        if (obj.hash || obj._needsHash) return obj; // already resolved

        let base;
        if (obj.type === 6) {
          const baseIdx = offsetToIdx[obj.basePackOffset];
          if (baseIdx === undefined) throw new Error('OFS_DELTA base not found at offset ' + obj.basePackOffset);
          base = resolveObject(baseIdx);
        } else if (obj.type === 7) {
          if (objectDb[obj.baseHash]) {
            base = { typeName: objectDb[obj.baseHash].type, data: objectDb[obj.baseHash].data };
          } else {
            // Find in objects array
            const baseObj = objects.find(o => o.hash === obj.baseHash);
            if (!baseObj) throw new Error('REF_DELTA base not found: ' + obj.baseHash);
            base = resolveObject(objects.indexOf(baseObj));
          }
        }

        const resolved = applyDelta(base.data, obj.deltaData);
        obj.typeName = base.typeName;
        obj.data = resolved;
        // Compute hash
        const header = new TextEncoder().encode(`${obj.typeName} ${resolved.length}\0`);
        const full = new Uint8Array(header.length + resolved.length);
        full.set(header);
        full.set(resolved, header.length);
        // sha1hex is async, we'll handle this differently
        obj._needsHash = true;
        obj._full = full;
        return obj;
      }

      for (let i = 0; i < objects.length; i++) {
        if (!objects[i].hash) {
          resolveObject(i);
        }
      }

      // Now compute hashes for resolved deltas (async)
      let resolved = 0;
      const totalToResolve = objects.filter(o => o._needsHash).length;
      for (let i = 0; i < objects.length; i++) {
        const obj = objects[i];
        if (obj._needsHash) {
          obj.hash = await sha1hex(obj._full);
          objectDb[obj.hash] = { type: obj.typeName, data: obj.data };
          delete obj._needsHash;
          delete obj._full;
          resolved++;
          if (resolved % 50 === 0) {
            status(`Resolving deltas ${resolved}/${totalToResolve}...`);
            showProgress(70 + (resolved / totalToResolve) * 30);
            await new Promise(r => setTimeout(r, 0));
          }
        }
      }

      showProgress(100);
      const typeCounts = {};
      for (const h of Object.keys(objectDb)) {
        typeCounts[objectDb[h].type] = (typeCounts[objectDb[h].type] || 0) + 1;
      }
      const typeStr = Object.entries(typeCounts).map(([t,c]) => `${c} ${t}s`).join(', ');
      console.log(`Pack stats: ${Object.keys(objectDb).length} objects (${typeStr})`);
      status(`Parsed ${numObjects} objects: ${typeStr}`);
      return objects;
    }

    // --- Tree parsing ---
    function parseTree(data) {
      const entries = [];
      let pos = 0;
      while (pos < data.length) {
        // Find space after mode
        let spaceIdx = pos;
        while (spaceIdx < data.length && data[spaceIdx] !== 0x20) spaceIdx++;
        if (spaceIdx >= data.length) break;
        const mode = new TextDecoder().decode(data.subarray(pos, spaceIdx));

        // Find null after name
        let nullIdx = spaceIdx + 1;
        while (nullIdx < data.length && data[nullIdx] !== 0) nullIdx++;
        if (nullIdx >= data.length || nullIdx + 21 > data.length) break;
        const name = new TextDecoder().decode(data.subarray(spaceIdx + 1, nullIdx));

        // 20-byte SHA1
        const hash = bytesToHex(data.subarray(nullIdx + 1, nullIdx + 21));
        pos = nullIdx + 21;

        const type = mode === '40000' ? 'tree' : (mode === '160000' ? 'commit' : 'blob');
        entries.push({ mode, name, hash, type });
      }
      return entries;
    }

    // --- Commit parsing ---
    function parseCommit(data) {
      const text = new TextDecoder().decode(data);
      const lines = text.split('\n');
      const result = { tree: null, parents: [], author: '', message: '' };
      let i = 0;
      for (; i < lines.length; i++) {
        if (lines[i] === '') { i++; break; }
        if (lines[i].startsWith('tree ')) result.tree = lines[i].slice(5);
        else if (lines[i].startsWith('parent ')) result.parents.push(lines[i].slice(7));
        else if (lines[i].startsWith('author ')) result.author = lines[i].slice(7);
      }
      result.message = lines.slice(i).join('\n').trim();
      return result;
    }

    // --- Clone ---
    async function doClone() {
      const repoUrl = document.getElementById('url').value.trim().replace(/\.git$/, '').replace(/\/$/, '');
      const corsProxy = document.getElementById('corsProxy').value.trim();
      if (!repoUrl) return status('Enter a URL', true);

      const btn = document.getElementById('cloneBtn');
      btn.disabled = true;

      // Clear previous state
      Object.keys(objectDb).forEach(k => delete objectDb[k]);
      currentCommit = null;
      document.getElementById('repo-info').style.display = 'none';
      document.getElementById('log-panel').style.display = 'none';
      document.getElementById('tree-panel').style.display = 'none';
      document.getElementById('file-panel').style.display = 'none';
      document.getElementById('commit-panel').style.display = 'none';

      const t0 = performance.now();
      try {
        // 1. Fetch refs - try with .git suffix first, then without
        status('Fetching refs...');
        let refsText, baseUrl;
        for (const suffix of ['.git', '']) {
          const tryUrl = repoUrl + suffix;
          const refsUrl = corsProxy + encodeURIComponent(tryUrl + '/info/refs?service=git-upload-pack');
          try {
            const refsResp = await fetch(refsUrl);
            if (refsResp.ok) {
              const text = await refsResp.text();
              if (text.includes('service=git-upload-pack') || text.match(/[0-9a-f]{40}/)) {
                refsText = text;
                baseUrl = tryUrl;
                break;
              }
            }
          } catch (e) { console.log('Fetch failed for', tryUrl, e); }
        }
        if (!refsText) throw new Error('Failed to fetch refs. Check that:\n• The repository URL is correct and public\n• The CORS proxy is working (try https://corsproxy.io/? or https://api.allorigins.win/raw?url=)\n• The repo has smart HTTP support enabled');

        const refs = parsePktLineRefs(refsText);
        console.log('Refs:', refs);

        const headHash = refs['HEAD'];
        if (!headHash) throw new Error('No HEAD ref found');
        showProgress(5);
        status(`HEAD: ${headHash.slice(0, 8)}. Fetching pack...`);

        // 2. Request pack
        const packBody = buildWantRequest(headHash);
        console.log('Pack request:', packBody);
        const packResp = await fetch(corsProxy + encodeURIComponent(baseUrl + '/git-upload-pack'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-git-upload-pack-request' },
          body: packBody
        });
        if (!packResp.ok) throw new Error('Failed to fetch pack: HTTP ' + packResp.status + ' ' + packResp.statusText);

        const packBuffer = await packResp.arrayBuffer();
        const packBytes = new Uint8Array(packBuffer);
        const dlSize = formatSize(packBytes.length);
        console.log('Pack response size:', packBytes.length);

        // Check for error responses (HTML error pages, JSON errors, etc.)
        if (packBytes.length < 20) {
          throw new Error('Pack response too small (' + packBytes.length + ' bytes). The CORS proxy may not support POST requests.');
        }
        // Check if response is HTML/JSON error page
        const firstBytes = String.fromCharCode(...packBytes.subarray(0, Math.min(50, packBytes.length)));
        if (firstBytes.startsWith('{"error') || firstBytes.startsWith('<!DOCTYPE') || firstBytes.startsWith('<html')) {
          throw new Error('CORS proxy returned an error page instead of pack data. Try a different proxy or check if POST requests are supported.\n' + firstBytes.slice(0, 200));
        }

        showProgress(15);
        status(`Downloaded ${dlSize}. Extracting pack...`);

        // 3. Extract pack data
        // Try sideband extraction first (we requested side-band-64k)
        let packData = extractFromSideband(packBytes);
        if (!packData) {
          // Fall back to finding raw PACK signature
          const packStart = findPackStart(packBytes);
          if (packStart >= 0) {
            packData = packBytes.slice(packStart);
          } else {
            // Log first bytes for debugging
            console.error('No PACK signature found. First 100 bytes:', bytesToHex(packBytes.subarray(0, 100)));
            throw new Error('PACK signature not found in response (' + dlSize + '). The server response may be in an unexpected format.');
          }
        }

        console.log('Pack data size:', packData.length);

        // 4. Parse pack
        await parsePack(packData);

        // 5. Display results
        currentCommit = headHash;
        const commit = objectDb[headHash];
        if (!commit) throw new Error('HEAD commit not in object database');

        // Show repo info
        const info = document.getElementById('repo-info');
        info.style.display = 'block';

        // Find branch name for HEAD
        let branchName = 'detached';
        for (const [ref, hash] of Object.entries(refs)) {
          if (hash === headHash && ref.startsWith('refs/heads/')) {
            branchName = ref.replace('refs/heads/', '');
            break;
          }
        }

        // Count tags
        const tags = Object.keys(refs).filter(r => r.startsWith('refs/tags/')).map(r => r.replace('refs/tags/', ''));
        const tagInfo = tags.length > 0 ? ` &nbsp; <strong>Tags:</strong> ${tags.length}` : '';

        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);

        document.getElementById('repo-details').innerHTML =
          `<strong>Branch:</strong> ${escHtml(branchName)} &nbsp; ` +
          `<strong>HEAD:</strong> <span class="hash" onclick="inspectCommit('${headHash}')">${headHash.slice(0,12)}</span> &nbsp; ` +
          `<strong>Objects:</strong> ${Object.keys(objectDb).length} &nbsp; ` +
          `<strong>Downloaded:</strong> ${dlSize} &nbsp; ` +
          `<span class="timing">Cloned in ${elapsed}s</span>` + tagInfo;

        // Show commit log
        showLog(headHash);

        // Show tree
        const parsed = parseCommit(commit.data);
        if (parsed.tree) showTree(parsed.tree, '/');

        showProgress(-1);
        status(`Ready! ${Object.keys(objectDb).length} objects cloned in ${elapsed}s. Click folders to browse.`);
      } catch (e) {
        showProgress(-1);
        status('Error: ' + e.message, true);
        console.error(e);
      }
      btn.disabled = false;
    }

    // --- Sideband extraction ---
    function extractFromSideband(data) {
      // git smart HTTP with side-band-64k: response is pkt-line encoded
      // Each pkt-line: 4 hex bytes length, then 1 byte channel, then payload
      // Channel 1 = pack data, channel 2 = progress, channel 3 = error
      // Also there may be "NAK\n" or flush packets (0000)
      const chunks = [];
      let pos = 0;
      let foundPack = false;

      while (pos + 4 <= data.length) {
        // Read 4-byte hex length
        const lenHex = String.fromCharCode(data[pos], data[pos+1], data[pos+2], data[pos+3]);

        if (lenHex === '0000' || lenHex === '0001' || lenHex === '0002') {
          pos += 4;
          continue;
        }

        // Validate hex chars before parsing
        if (!/^[0-9a-f]{4}$/i.test(lenHex)) break;

        const len = parseInt(lenHex, 16);
        if (len < 4) break;

        if (pos + len > data.length) break;

        const payload = data.slice(pos + 4, pos + len);
        pos += len;

        if (payload.length === 0) continue;

        // Check if this is a non-sideband line (e.g. NAK, ACK)
        // NAK/ACK lines don't have a channel byte - they're plain text pkt-lines
        const payloadStr = new TextDecoder().decode(payload);
        if (payloadStr.startsWith('NAK') || payloadStr.startsWith('ACK')) {
          console.log('git:', payloadStr.trim());
          continue;
        }

        const channel = payload[0];
        if (channel === 1) {
          // Pack data
          chunks.push(payload.slice(1));
          foundPack = true;
        } else if (channel === 2) {
          // Progress
          const msg = new TextDecoder().decode(payload.slice(1));
          console.log('git progress:', msg.trim());
        } else if (channel === 3) {
          // Error
          const msg = new TextDecoder().decode(payload.slice(1));
          console.error('git error:', msg);
        }
        // Other non-sideband lines - just skip
      }

      if (!foundPack || chunks.length === 0) return null;

      // Concatenate chunks
      const totalLen = chunks.reduce((s, c) => s + c.length, 0);
      const result = new Uint8Array(totalLen);
      let offset = 0;
      for (const chunk of chunks) {
        result.set(chunk, offset);
        offset += chunk.length;
      }

      // Verify PACK header
      if (result[0] === 0x50 && result[1] === 0x41 && result[2] === 0x43 && result[3] === 0x4B) {
        return result;
      }

      // Maybe there's some prefix before PACK
      const packIdx = findPackStart(result);
      if (packIdx >= 0) return result.slice(packIdx);

      return null;
    }

    // --- Display ---
    function showLog(headHash) {
      const panel = document.getElementById('log-panel');
      panel.style.display = 'block';
      const tbody = document.querySelector('#log-table tbody');
      tbody.innerHTML = '';

      let hash = headHash;
      let count = 0;
      while (hash && count < 50) {
        const obj = objectDb[hash];
        if (!obj || obj.type !== 'commit') break;
        const c = parseCommit(obj.data);
        const authorShort = c.author.replace(/<[^>]+>.*/, '').trim();
        const msgShort = c.message.split('\n')[0].slice(0, 80);

        const tr = document.createElement('tr');
        tr.innerHTML =
          `<td><span class="hash" onclick="inspectCommit('${hash}')">${hash.slice(0, 8)}</span></td>` +
          `<td>${escHtml(authorShort)}</td>` +
          `<td>${escHtml(msgShort)}</td>`;
        tbody.appendChild(tr);

        hash = c.parents[0] || null;
        count++;
      }
    }

    function showTree(treeHash, path) {
      const obj = objectDb[treeHash];
      if (!obj || obj.type !== 'tree') {
        status('Tree not found: ' + treeHash, true);
        return;
      }

      const entries = parseTree(obj.data);
      const panel = document.getElementById('tree-panel');
      panel.style.display = 'block';
      const searchBox = document.getElementById('search');
      searchBox.style.display = 'block';
      searchBox.value = '';

      // Breadcrumb with navigable path segments
      const bc = document.getElementById('tree-breadcrumb');
      const parts = path.split('/').filter(Boolean);
      let bcHtml = `<a onclick="showTreeFromCommit()">root</a>`;
      // Walk from root tree to build navigable breadcrumb
      if (parts.length > 0 && currentCommit && objectDb[currentCommit]) {
        let walkHash = parseCommit(objectDb[currentCommit].data).tree;
        for (let pi = 0; pi < parts.length; pi++) {
          if (pi < parts.length - 1 && walkHash && objectDb[walkHash]) {
            // Find this segment's subtree hash for navigation
            const segEntries = parseTree(objectDb[walkHash].data);
            const child = segEntries.find(e => e.name === parts[pi] && e.type === 'tree');
            if (child) {
              const segPath = '/' + parts.slice(0, pi + 1).join('/') + '/';
              bcHtml += ` / <a onclick="showTree('${child.hash}', '${segPath}')">${escHtml(parts[pi])}</a>`;
              walkHash = child.hash;
            } else {
              bcHtml += ` / ${escHtml(parts[pi])}`;
              walkHash = null;
            }
          } else {
            bcHtml += ` / ${escHtml(parts[pi])}`;
          }
        }
      }
      bc.innerHTML = bcHtml;

      const tbody = document.querySelector('#tree-table tbody');
      tbody.innerHTML = '';

      // Sort: trees first, then submodules, then blobs, then by name
      const typeOrder = { tree: 0, commit: 1, blob: 2 };
      entries.sort((a, b) => {
        const ta = typeOrder[a.type] ?? 2, tb = typeOrder[b.type] ?? 2;
        if (ta !== tb) return ta - tb;
        return a.name.localeCompare(b.name);
      });

      entries.forEach(e => {
        const tr = document.createElement('tr');
        const safeName = e.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        let nameClass, onclick;
        if (e.type === 'tree') {
          nameClass = 'tree-link';
          onclick = `showTree('${e.hash}', '${path}${safeName}/')`;
        } else if (e.type === 'commit') {
          nameClass = 'submodule-link';
          onclick = '';
        } else {
          nameClass = 'blob-link';
          onclick = `showFile('${e.hash}', '${safeName}')`;
        }
        // Show size for blobs, entry count for trees
        let sizeStr = '';
        if (e.type === 'blob' && objectDb[e.hash]) {
          sizeStr = formatSize(objectDb[e.hash].data.length);
        } else if (e.type === 'tree' && objectDb[e.hash]) {
          const subEntries = parseTree(objectDb[e.hash].data);
          sizeStr = subEntries.length + ' items';
        } else if (e.type === 'commit') {
          sizeStr = 'submodule';
        }
        tr.innerHTML =
          `<td class="info">${e.mode}</td>` +
          `<td class="info">${e.type}</td>` +
          `<td><span class="${nameClass}"${onclick ? ` onclick="${onclick}"` : ''}>${escHtml(e.name)}</span></td>` +
          `<td class="info">${sizeStr}</td>` +
          `<td><span class="hash" title="${e.hash}">${e.hash.slice(0, 8)}</span></td>`;
        tbody.appendChild(tr);
      });

      // Auto-show README if present
      const readme = entries.find(e => e.type === 'blob' && /^readme/i.test(e.name));
      if (readme && objectDb[readme.hash]) {
        showFile(readme.hash, readme.name);
      }
    }

    function showTreeFromCommit() {
      if (!currentCommit) return;
      const obj = objectDb[currentCommit];
      if (!obj) return;
      const c = parseCommit(obj.data);
      if (c.tree) showTree(c.tree, '/');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function isBinary(data) {
      // Check first 8KB for null bytes
      const check = Math.min(data.length, 8192);
      for (let i = 0; i < check; i++) {
        if (data[i] === 0) return true;
      }
      return false;
    }

    function downloadFile(blobHash, name) {
      const obj = objectDb[blobHash];
      if (!obj) return;
      const blob = new Blob([obj.data]);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name; a.click();
      URL.revokeObjectURL(url);
    }

    function showFile(blobHash, name) {
      const obj = objectDb[blobHash];
      if (!obj) { status('Blob not found: ' + blobHash, true); return; }
      const panel = document.getElementById('file-panel');
      panel.style.display = 'block';
      document.getElementById('file-name').innerHTML = escHtml(name) + ' (' + formatSize(obj.data.length) + ') <button onclick="downloadFile(\'' + blobHash + '\', \'' + name.replace(/'/g, "\\'") + '\')" style="font-size:0.8em;padding:2px 8px">⬇ Download</button>';
      const contentEl = document.getElementById('file-content');
      if (isBinary(obj.data)) {
        // Check if it's an image
        const ext = name.split('.').pop().toLowerCase();
        if (['png','jpg','jpeg','gif','webp','svg','ico','bmp'].includes(ext)) {
          const mime = ext === 'svg' ? 'image/svg+xml' : `image/${ext === 'jpg' ? 'jpeg' : ext}`;
          const blob = new Blob([obj.data], { type: mime });
          const url = URL.createObjectURL(blob);
          contentEl.innerHTML = `<img src="${url}" style="max-width:100%;max-height:400px;" alt="${escHtml(name)}">`;
        } else {
          contentEl.textContent = `[Binary file, ${formatSize(obj.data.length)}]`;
        }
      } else {
        const text = new TextDecoder('utf-8', { fatal: false }).decode(obj.data);
        const displayText = text.length > 200000 ? text.slice(0, 200000) + '\n... (truncated)' : text;
        const lines = displayText.split('\n');
        if (lines.length > 1) {
          const nums = lines.map((_, i) => i + 1).join('\n');
          contentEl.innerHTML = `<div class="line-numbers"><div class="nums">${nums}</div><div class="code">${escHtml(displayText)}</div></div>`;
        } else {
          contentEl.textContent = displayText;
        }
      }
      // Scroll file panel into view
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function inspectCommit(hash) {
      currentCommit = hash;
      const obj = objectDb[hash];
      if (!obj) { status('Commit not found', true); return; }
      const c = parseCommit(obj.data);
      if (c.tree) showTree(c.tree, '/');
      showCommitDetails(hash, c);
      status('Viewing commit ' + hash.slice(0, 8));
    }

    function flattenTree(treeHash, prefix) {
      const obj = objectDb[treeHash];
      if (!obj || obj.type !== 'tree') return {};
      const entries = parseTree(obj.data);
      const files = {};
      for (const e of entries) {
        const path = prefix ? prefix + '/' + e.name : e.name;
        if (e.type === 'tree') {
          Object.assign(files, flattenTree(e.hash, path));
        } else if (e.type === 'blob') {
          files[path] = e.hash;
        }
      }
      return files;
    }

    function showCommitDetails(hash, commit) {
      const panel = document.getElementById('commit-panel');
      panel.style.display = 'block';
      document.getElementById('commit-hash').textContent = hash.slice(0, 12);

      let html = `<div class="info" style="margin-bottom:8px">`;
      html += `<strong>Author:</strong> ${escHtml(commit.author)}<br>`;
      html += `<strong>Message:</strong> ${escHtml(commit.message.split('\n')[0])}`;
      if (commit.parents.length) html += `<br><strong>Parent:</strong> <span class="hash" onclick="inspectCommit('${commit.parents[0]}')">${commit.parents[0].slice(0,8)}</span>`;
      html += `</div>`;

      // Compare trees to show changed files
      if (commit.parents.length > 0 && objectDb[commit.parents[0]]) {
        const parentCommit = parseCommit(objectDb[commit.parents[0]].data);
        if (parentCommit.tree && commit.tree) {
          const oldFiles = flattenTree(parentCommit.tree, '');
          const newFiles = flattenTree(commit.tree, '');
          const allPaths = new Set([...Object.keys(oldFiles), ...Object.keys(newFiles)]);
          const changes = [];
          for (const path of [...allPaths].sort()) {
            const oh = oldFiles[path], nh = newFiles[path];
            if (!oh) changes.push({ path, status: 'A', color: '#7ee787' });
            else if (!nh) changes.push({ path, status: 'D', color: '#f85149' });
            else if (oh !== nh) changes.push({ path, status: 'M', color: '#d29922' });
          }
          if (changes.length > 0) {
            html += `<div style="margin-top:8px"><strong>${changes.length} file${changes.length>1?'s':''} changed:</strong></div>`;
            html += `<div style="max-height:200px;overflow-y:auto;margin-top:4px;font-size:0.85em">`;
            for (const c of changes) {
              html += `<div><span style="color:${c.color};font-weight:bold;width:20px;display:inline-block">${c.status}</span> ${escHtml(c.path)}</div>`;
            }
            html += `</div>`;
          } else {
            html += `<div class="info">No file changes detected</div>`;
          }
        }
      } else if (commit.parents.length === 0) {
        html += `<div class="info">Initial commit</div>`;
      }

      document.getElementById('commit-details').innerHTML = html;
    }

    function filterTree() {
      const q = document.getElementById('search').value.toLowerCase();
      const rows = document.querySelectorAll('#tree-table tbody tr');
      rows.forEach(row => {
        const name = row.querySelector('td:nth-child(3)');
        if (name) {
          row.style.display = name.textContent.toLowerCase().includes(q) ? '' : 'none';
        }
      });
    }
  </script>
</body>
</html>
