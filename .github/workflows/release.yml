name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: ziggit-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-linux
            artifact: ziggit-linux-aarch64
          - os: macos-latest
            target: aarch64-macos
            artifact: ziggit-macos-aarch64
          - os: macos-latest
            target: x86_64-macos
            artifact: ziggit-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: |
          zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
          mv zig-out/bin/ziggit ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build WASM
        run: |
          zig build wasm
          cp zig-out/wasm/ziggit.wasm ziggit.wasm
          gzip -k ziggit.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ziggit-wasm
          path: |
            ziggit.wasm
            ziggit.wasm.gz

  release:
    needs: [build, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          for dir in artifacts/ziggit-*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/ziggit-linux-* release/ziggit-macos-* 2>/dev/null || true
          ls -lh release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
